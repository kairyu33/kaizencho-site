<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="washi" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8F1E5"/>
      <stop offset="50%" stop-color="#F2E7D2"/>
      <stop offset="100%" stop-color="#E8D9BE"/>
    </linearGradient>
    <filter id="paper" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="3"/>
      <feColorMatrix values="0 0 0 0 0.4  0 0 0 0 0.28  0 0 0 0 0.16  0 0 0 0.10 0"/>
    </filter>
    <pattern id="seigaiha" x="0" y="0" width="80" height="40" patternUnits="userSpaceOnUse">
      <path d="M0 40 A40 40 0 0 1 80 40" fill="none" stroke="#B88A2F" stroke-width="1" opacity="0.18"/>
      <path d="M-40 40 A40 40 0 0 1 40 40" fill="none" stroke="#B88A2F" stroke-width="1" opacity="0.18"/>
      <path d="M40 40 A40 40 0 0 1 120 40" fill="none" stroke="#B88A2F" stroke-width="1" opacity="0.18"/>
    </pattern>
  </defs>

  <!-- 和紙ベース -->
  <rect width="1200" height="630" fill="url(#washi)"/>
  <rect width="1200" height="630" fill="url(#seigaiha)"/>
  <rect width="1200" height="630" filter="url(#paper)"/>

  <!-- 朱の枠 -->
  <rect x="32" y="32" width="1136" height="566" fill="none" stroke="#B23A2E" stroke-width="2"/>
  <rect x="44" y="44" width="1112" height="542" fill="none" stroke="#B23A2E" stroke-width="0.6" opacity="0.6"/>

  <!-- 上部のれん風帯 -->
  <rect x="44" y="44" width="1112" height="78" fill="#1C1613"/>
  <text x="600" y="98" text-anchor="middle"
        font-family="'Yuji Syuku', 'Shippori Mincho', serif"
        font-size="44" fill="#F6EDE0" letter-spacing="20">献 立 帖</text>

  <!-- 朱の印章 (右上) -->
  <g transform="translate(1040, 200)">
    <rect x="-50" y="-50" width="100" height="100" fill="#B23A2E"/>
    <text x="0" y="-8" text-anchor="middle" font-family="'Yuji Syuku', serif"
          font-size="30" fill="#F6EDE0" font-weight="700">成功</text>
    <text x="0" y="32" text-anchor="middle" font-family="'Yuji Syuku', serif"
          font-size="30" fill="#F6EDE0" font-weight="700">の印</text>
  </g>

  <!-- メインコピー -->
  <text x="100" y="290" font-family="'Yuji Syuku', 'Shippori Mincho', serif"
        font-size="78" fill="#1C1613" font-weight="700">千の記事から、</text>
  <text x="100" y="390" font-family="'Yuji Syuku', 'Shippori Mincho', serif"
        font-size="78" fill="#1C1613" font-weight="700">今日のあなたに届く</text>
  <text x="100" y="490" font-family="'Yuji Syuku', 'Shippori Mincho', serif"
        font-size="78" fill="#B23A2E" font-weight="700">一献を。</text>

  <!-- 区切り線 -->
  <line x1="100" y1="525" x2="400" y2="525" stroke="#B88A2F" stroke-width="1.5"/>

  <!-- サブテキスト -->
  <text x="100" y="560" font-family="'Shippori Mincho', serif"
        font-size="26" fill="#3a2f25" letter-spacing="4">一献ガチャ ・ お品書き投票 ・ 献立目録</text>

  <!-- 店主名 (下部) -->
  <text x="1100" y="555" text-anchor="end" font-family="'Shippori Mincho', serif"
        font-size="24" fill="#5a4a38" letter-spacing="3">店主 ・ 成功のレシピ</text>
</svg>
